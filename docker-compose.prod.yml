services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: achadinhos-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - achadinhos_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  achadinhos-next:
    build:
      context: .
      dockerfile: AchadinhosBot.Next/Dockerfile
    image: achadinhos-next:prod
    container_name: achadinhos-next-prod
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      KESTREL__ENDPOINTS__HTTP__URL: http://0.0.0.0:${WEBHOOK__PORT:-5005}
      WEBHOOK__PORT: ${WEBHOOK__PORT:-5005}
      WEBHOOK__API_KEY: ${WEBHOOK__API_KEY}
      WEBHOOK__PUBLICBASEURL: ${WEBHOOK__PUBLICBASEURL}
      EVOLUTION__BASEURL: ${EVOLUTION__BASEURL:-http://host.docker.internal:8082}
      EVOLUTION__APIKEY: ${EVOLUTION__APIKEY}
      EVOLUTION__INSTANCENAME: ${EVOLUTION__INSTANCENAME:-ZapOfertas}
      EVOLUTION__WEBHOOKSECRET: ${EVOLUTION__WEBHOOKSECRET}
      TELEGRAM__BOTTOKEN: ${TELEGRAM__BOTTOKEN}
      TELEGRAM__APIID: ${TELEGRAM__APIID:-0}
      TELEGRAM__APIHASH: ${TELEGRAM__APIHASH}
      TELEGRAM__USERBOTPHONE: ${TELEGRAM__USERBOTPHONE}
      TELEGRAM__DESTINATIONCHATID: ${TELEGRAM__DESTINATIONCHATID:-0}
      TELEGRAM__LOGSCHATID: ${TELEGRAM__LOGSCHATID:-0}
      WTELEGRAM_SESSION: /app/data/WTelegram.session
      AFFILIATE__AMAZONTAG: ${AFFILIATE__AMAZONTAG}
      AFFILIATE__SHEINID: ${AFFILIATE__SHEINID}
      AFFILIATE__SHEINCODE: ${AFFILIATE__SHEINCODE}
      AFFILIATE__MERCADOLIVREMATTTOOL: ${AFFILIATE__MERCADOLIVREMATTTOOL}
      AFFILIATE__MERCADOLIVREMATTWORD: ${AFFILIATE__MERCADOLIVREMATTWORD}
      DELIVERYSAFETY__BLOCKOFFICIALDESTINATIONSOUTSIDEPRODUCTION: "true"
      DELIVERYSAFETY__OFFICIALWHATSAPPGROUPIDS__0: ${OFFICIAL_WHATSAPP_GROUP_ID}
      DELIVERYSAFETY__OFFICIALTELEGRAMCHATIDS__0: ${OFFICIAL_TELEGRAM_CHAT_ID:-0}
      RABBITMQ__HOST: rabbitmq
      RABBITMQ__VIRTUALHOST: /
      RABBITMQ__USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ__PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${WEBHOOK__PORT:-5005}:${WEBHOOK__PORT:-5005}"
    volumes:
      - achadinhos_data:/app/data
      - achadinhos_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${WEBHOOK__PORT:-5005}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  achadinhos_data:
    external: true
    name: achadinhos-prod_achadinhos_data
  achadinhos_logs:
    external: true
    name: achadinhos-prod_achadinhos_logs
  achadinhos_rabbitmq_data:
    external: true
    name: achadinhos-prod_achadinhos_rabbitmq_data
