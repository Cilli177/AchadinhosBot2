name: achadinhos-prod

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: achadinhos-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ__USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ__PASSWORD}
    volumes:
      - achadinhos_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  achadinhos-next:
    build:
      context: .
      dockerfile: AchadinhosBot.Next/Dockerfile
    image: achadinhos-next:prod
    container_name: achadinhos-next-prod
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - KESTREL__ENDPOINTS__HTTP__URL=http://0.0.0.0:5005
      - DELIVERYSAFETY__BLOCKOFFICIALDESTINATIONSOUTSIDEPRODUCTION=true
      - DELIVERYSAFETY__BLOCKOFFICIALWHATSAPPALWAYS=false
      - RABBITMQ__HOST=rabbitmq
      - RABBITMQ__VIRTUALHOST=/
      - RABBITMQ__USERNAME=${RABBITMQ__USERNAME}
      - RABBITMQ__PASSWORD=${RABBITMQ__PASSWORD}
      - UPTIME_MONITOR__STATEFILE=/app/monitor/uptime-monitor-state.json
    ports:
      - "5005:5005"
    volumes:
      - achadinhos_data:/app/data
      - achadinhos_logs:/app/logs
      - ./data:/app/monitor:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  achadinhos_data:
    external: true
    name: achadinhos-prod_achadinhos_data
  achadinhos_logs:
    external: true
    name: achadinhos-prod_achadinhos_logs
  achadinhos_rabbitmq_data:
    external: true
    name: achadinhos-prod_achadinhos_rabbitmq_data
