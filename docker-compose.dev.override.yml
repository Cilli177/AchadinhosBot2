services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: achadinhos-rabbitmq-dev
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - achadinhos_dev_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  achadinhos-next:
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8083:8081"
    env_file:
      - AchadinhosBot.Next/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      WEBHOOK__PORT: 8081
      WEBHOOK__APIKEY: "${WEBHOOK__API_KEY:-CHANGE_ME_WEBHOOK_API_KEY}"
      KESTREL__ENDPOINTS__HTTP__URL: http://0.0.0.0:8081
      AUTH__USERS__0__USERNAME: "${AUTH__USERS__0__USERNAME:-admin}"
      AUTH__USERS__0__PASSWORDHASH: "${AUTH__USERS__0__PASSWORDHASH:-CHANGE_ME_PBKDF2_HASH}"
      AUTH__USERS__0__ROLE: admin
      AUTH__USERS__0__ENABLED: "true"
      AUTH__USERS__1__USERNAME: "${AUTH__USERS__1__USERNAME:-operator}"
      AUTH__USERS__1__PASSWORDHASH: "${AUTH__USERS__1__PASSWORDHASH:-CHANGE_ME_PBKDF2_HASH}"
      AUTH__USERS__1__ROLE: operator
      AUTH__USERS__1__ENABLED: "true"
      AUTH__USERS__2__USERNAME: "${AUTH__USERS__2__USERNAME:-reviewer}"
      AUTH__USERS__2__PASSWORDHASH: "${AUTH__USERS__2__PASSWORDHASH:-CHANGE_ME_PBKDF2_HASH}"
      AUTH__USERS__2__ROLE: operator
      AUTH__USERS__2__ENABLED: "true"
      TELEGRAM__BOTTOKEN: "${TELEGRAM__BOTTOKEN}"
      TELEGRAM__APIID: "${TELEGRAM__APIID:-0}"
      TELEGRAM__APIHASH: "${TELEGRAM__APIHASH:-CHANGE_ME_TELEGRAM_API_HASH}"
      TELEGRAM__USERBOTPHONE: "${TELEGRAM__USERBOTPHONE:-+5500000000000}"
      EVOLUTION__BASE_URL: "${EVOLUTION__BASE_URL:-http://host.docker.internal:8082}"
      EVOLUTION__API_KEY: "${EVOLUTION__API_KEY:-CHANGE_ME_EVOLUTION_API_KEY}"
      EVOLUTION__INSTANCE_NAME: "${EVOLUTION__INSTANCE_NAME:-ZapOfertasDev}"
      EVOLUTION__BASEURL: "${EVOLUTION__BASE_URL:-http://host.docker.internal:8082}"
      EVOLUTION__APIKEY: "${EVOLUTION__API_KEY:-CHANGE_ME_EVOLUTION_API_KEY}"
      EVOLUTION__INSTANCENAME: "${EVOLUTION__INSTANCE_NAME:-ZapOfertasDev}"
      RABBITMQ__HOST: "${RABBITMQ__HOST:-rabbitmq}"
      RABBITMQ__VIRTUALHOST: "${RABBITMQ__VIRTUALHOST:-/}"
      RABBITMQ__USERNAME: "${RABBITMQ__USERNAME:-guest}"
      RABBITMQ__PASSWORD: "${RABBITMQ__PASSWORD:-guest}"
      AFFILIATE__SHOPEEAPPID: "${AFFILIATE__SHOPEEAPPID:-CHANGE_ME_SHOPEE_APP_ID}"
      AFFILIATE__SHOPEESECRET: "${AFFILIATE__SHOPEESECRET:-CHANGE_ME_SHOPEE_SECRET}"
      AFFILIATE__SHOPEE_APP_ID: "${AFFILIATE__SHOPEE_APP_ID:-CHANGE_ME_SHOPEE_APP_ID}"
      AFFILIATE__SHOPEE_SECRET: "${AFFILIATE__SHOPEE_SECRET:-CHANGE_ME_SHOPEE_SECRET}"
      AFFILIATE__AMAZONTAG: "${AFFILIATE__AMAZONTAG:-CHANGE_ME_AMAZON_TAG}"
      AFFILIATE__SHEINID: "${AFFILIATE__SHEINID:-CHANGE_ME_SHEIN_ID}"
      AFFILIATE__SHEINCODE: "${AFFILIATE__SHEINCODE:-CHANGE_ME_SHEIN_CODE}"
      AFFILIATE__MERCADOLIVREMATTWORD: ""
      AFFILIATE__MERCADOLIVREMATTOOL: ""
      DELIVERYSAFETY__BLOCKOFFICIALWHATSAPPALWAYS: "true"
      DELIVERYSAFETY__OFFICIALWHATSAPPGROUPIDS__0: 120363405661434395@g.us

volumes:
  achadinhos_dev_rabbitmq_data:
