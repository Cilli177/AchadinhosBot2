services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: achadinhos-rabbitmq-dev
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - achadinhos_dev_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  achadinhos-next:
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8083:8081"
    env_file:
      - AchadinhosBot.Next/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      WEBHOOK__PORT: 8081
      WEBHOOK__APIKEY: "admin-dev-2024"
      KESTREL__ENDPOINTS__HTTP__URL: http://0.0.0.0:8081
      AUTH__USERS__0__USERNAME: admin
      AUTH__USERS__0__PASSWORDHASH: pbkdf2$$100000$$MX+KqWb7deh/zUQIG8Eg7w==$$MXsJq7TvuxuvptJ9bpeejaJ5MVWdJOa12AEj00/ObVQ=
      AUTH__USERS__0__ROLE: admin
      AUTH__USERS__0__ENABLED: "true"
      AUTH__USERS__1__USERNAME: operator
