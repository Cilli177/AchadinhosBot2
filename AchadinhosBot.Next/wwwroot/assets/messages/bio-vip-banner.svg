<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1600" viewBox="0 0 1080 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03051a"/>
      <stop offset="100%" stop-color="#071026"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8b56a"/>
      <stop offset="100%" stop-color="#f0d98a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101b33"/>
      <stop offset="100%" stop-color="#17213b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .ui{font:700 24px/1 Arial, Helvetica, sans-serif; fill:#d8dee9}
      .title{font:800 62px/1.1 Arial, Helvetica, sans-serif; fill:#d9b56e; letter-spacing:2px}
      .sub{font:400 34px/1.35 Arial, Helvetica, sans-serif; fill:#c1cbe0}
      .small{font:400 24px/1.35 Arial, Helvetica, sans-serif; fill:#8b97ad}
      .cardTitle{font:700 30px/1 Arial, Helvetica, sans-serif; fill:#ffffff}
      .cardDesc{font:400 22px/1.35 Arial, Helvetica, sans-serif; fill:#aab6ce}
      .badge{font:800 26px/1 Arial, Helvetica, sans-serif; fill:#d8b56e; letter-spacing:2px}
      .link{font:700 24px/1 Arial, Helvetica, sans-serif; fill:#d9b56e}
      .chip{font:800 36px/1 Arial, Helvetica, sans-serif; fill:#d8b56e}
    </style>
  </defs>
  <rect width="1080" height="1600" fill="url(#bg)"/>
  <circle cx="540" cy="114" r="92" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <text x="540" y="152" text-anchor="middle" class="chip">VIP</text>
  <text x="540" y="274" text-anchor="middle" class="title">REI DAS OFERTAS</text>
  <text x="540" y="320" text-anchor="middle" class="small">Achadinhos em destaque</text>
  <text x="540" y="370" text-anchor="middle" class="sub">Toque no botao para abrir a oferta com o melhor link.</text>
  <text x="540" y="415" text-anchor="middle" class="small">Origem: bio</text>

  <g filter="url(#shadow)">
    <rect x="92" y="512" width="896" height="138" rx="26" fill="url(#card)" stroke="#2d3750"/>
    <circle cx="152" cy="581" r="29" fill="#0f3a2a" stroke="#2f8f65"/>
    <text x="152" y="590" text-anchor="middle" class="ui" style="font-size:28px;">💬</text>
    <text x="208" y="579" class="cardTitle">Entrar no WhatsApp</text>
    <text x="208" y="621" class="cardDesc">Receba ofertas, alertas e os links primeiro por la.</text>
    <text x="932" y="594" text-anchor="end" class="badge">WHATSAPP</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="670" width="896" height="138" rx="26" fill="url(#card)" stroke="#2d3750"/>
    <circle cx="152" cy="739" r="29" fill="#153c5c" stroke="#4aa3d8"/>
    <text x="152" y="748" text-anchor="middle" class="ui" style="font-size:26px;">✈</text>
    <text x="208" y="737" class="cardTitle">Entrar no Telegram</text>
    <text x="208" y="779" class="cardDesc">Entre no canal para acompanhar alertas e ofertas em tempo real.</text>
    <text x="932" y="752" text-anchor="end" class="badge">TELEGRAM</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="828" width="896" height="138" rx="26" fill="url(#card)" stroke="#2d3750"/>
    <circle cx="152" cy="897" r="29" fill="#5a245c" stroke="#d86bc9"/>
    <text x="152" y="906" text-anchor="middle" class="ui" style="font-size:26px;">📷</text>
    <text x="208" y="895" class="cardTitle">Seguir no Instagram</text>
    <text x="208" y="937" class="cardDesc">Acompanhe reels, stories e posts com os melhores achadinhos.</text>
    <text x="932" y="910" text-anchor="end" class="badge">INSTAGRAM</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="986" width="896" height="138" rx="26" fill="url(#card)" stroke="#2d3750"/>
    <circle cx="152" cy="1055" r="29" fill="#433b30" stroke="#d1ad69"/>
    <text x="152" y="1064" text-anchor="middle" class="ui" style="font-size:26px;">🛒</text>
    <text x="208" y="1053" class="cardTitle">Abrir Catalogo VIP</text>
    <text x="208" y="1095" class="cardDesc">Veja todas as ofertas publicadas e acesse os links atualizados.</text>
    <text x="932" y="1068" text-anchor="end" class="badge">CATALOGO</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="1144" width="896" height="138" rx="26" fill="url(#card)" stroke="#2d3750"/>
    <circle cx="152" cy="1213" r="29" fill="#423733" stroke="#bfa174"/>
    <text x="152" y="1222" text-anchor="middle" class="ui" style="font-size:24px;">🔗</text>
    <text x="208" y="1211" class="cardTitle">Abrir Conversor de Links</text>
    <text x="208" y="1253" class="cardDesc">Converta links rapidamente e encontre ofertas prontas para comprar.</text>
    <text x="932" y="1226" text-anchor="end" class="badge">CONVERSOR</text>
  </g>

  <text x="92" y="1410" class="title" style="font-size:34px; letter-spacing:1px;">TOP 3 OFERTAS EM DESTAQUE</text>
  <g filter="url(#shadow)">
    <rect x="92" y="1440" width="896" height="120" rx="24" fill="#10192f" stroke="#26314a"/>
    <rect x="118" y="1460" width="160" height="80" rx="16" fill="#f4f4f4"/>
    <rect x="312" y="1464" width="260" height="18" rx="9" fill="#d8b56e"/>
    <rect x="312" y="1494" width="320" height="12" rx="6" fill="#7b879c"/>
    <rect x="312" y="1518" width="140" height="12" rx="6" fill="#d8b56e"/>
  </g>
</svg>
