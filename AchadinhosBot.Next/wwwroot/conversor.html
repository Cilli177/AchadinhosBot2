<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Converter - Rei das Ofertas</title>
    <meta name="description"
        content="Transforme links da Amazon, Shopee e Mercado Livre em ofertas exclusivas rastreáveis com afiliados VIP.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        accent: '#c4a468',
                        accentHover: '#b39359',
                        surface: '#1e293b'
                    },
                    fontFamily: {
                        display: ['Montserrat', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 20s infinite ease-in-out alternate',
                        'count-up': 'countUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        float: { '0%': { transform: 'translate(0,0) scale(1)' }, '100%': { transform: 'translate(50px,50px) scale(1.1)' } },
                        countUp: { from: { opacity: 0, transform: 'translateY(8px)' }, to: { opacity: 1, transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Montserrat', sans-serif;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .result-container {
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #f8fafc;
            color: #0f172a;
            padding: 1rem 2rem;
            border-radius: 999px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        #errorAlert {
            display: none;
        }

        #discountBadge {
            display: none;
        }

        #deliveryInfo {
            display: none;
        }

        .tilt-card {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* QR Modal */
        #qrModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        #qrModal.show {
            display: flex;
        }

        #qrCanvas canvas {
            border-radius: 12px;
        }
    </style>
</head>

<body
    class="bg-primary text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 md:p-8 relative overflow-x-hidden">

    <!-- Background Orbs -->
    <div
        class="absolute w-[400px] h-[400px] bg-accent/10 rounded-full blur-[80px] -top-24 -left-24 animate-float -z-10">
    </div>
    <div class="absolute w-[500px] h-[500px] bg-sky-500/10 rounded-full blur-[80px] -bottom-48 -right-24 animate-float -z-10"
        style="animation-delay:-5s"></div>

    <main
        class="w-full max-w-3xl bg-surface/40 backdrop-blur-xl border border-white/10 rounded-[24px] p-6 md:p-12 shadow-2xl">

        <!-- Header -->
        <div class="text-center mb-10">
            <div
                class="w-12 h-12 bg-accent rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(196,164,104,0.4)] mb-4">
                <span class="text-primary font-black text-sm tracking-tighter">VIP</span>
            </div>
            <h1
                class="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-accent to-yellow-300 mb-3">
                Conversor Mágico</h1>
            <p class="text-slate-400 text-lg">Transforme links comuns em <span class="text-accent font-semibold">Ofertas
                    Exclusivas</span> rastreáveis.</p>
            <!-- Conversion Counter -->
            <div id="counterBadge"
                class="hidden mt-3 inline-flex items-center gap-1.5 bg-accent/10 border border-accent/20 rounded-full px-4 py-1.5">
                <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <span class="text-accent text-sm font-semibold"><span id="counterValue">0</span> links convertidos por
                    você</span>
            </div>
        </div>

        <!-- Form -->
        <form id="convertForm" class="flex flex-col gap-4" onsubmit="return false;">
            <input type="text" id="urlInput"
                class="w-full bg-primary/60 border border-white/10 rounded-2xl px-6 py-4 text-white text-lg placeholder-slate-500 focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all"
                placeholder="Cole o link da Amazon, Shopee, Mercado Livre..." autocomplete="off">
            <button type="button" id="submitBtn" onclick="handleConvert()"
                class="w-full bg-accent hover:bg-accentHover text-primary font-bold text-lg px-6 py-4 rounded-2xl transition-all shadow-lg hover:shadow-accent/20 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
                <span class="btn-text">✨ Gerar Link VIP Exclusivo</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        <div id="errorAlert"
            class="mt-6 bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl font-medium"></div>

        <!-- Skeleton Loader -->
        <div id="skeletonLoader" class="hidden mt-10">
            <div
                class="bg-[#151f32] border border-white/5 rounded-[20px] overflow-hidden flex flex-col md:flex-row shadow-xl animate-pulse">
                <div
                    class="w-full md:w-2/5 h-64 bg-white/5 flex items-center justify-center border-b md:border-b-0 md:border-r border-white/5">
                    <div class="w-20 h-20 bg-white/10 rounded-full"></div>
                </div>
                <div class="w-full md:w-3/5 p-6 md:p-8 flex flex-col justify-between space-y-4">
                    <div class="space-y-3">
                        <div class="h-6 bg-white/10 rounded-lg w-1/4"></div>
                        <div class="h-8 bg-white/10 rounded-lg w-3/4"></div>
                        <div class="h-8 bg-white/10 rounded-lg w-1/2"></div>
                    </div>
                    <div class="grid grid-cols-5 gap-3 mt-4">
                        <div class="h-10 bg-white/10 rounded-xl col-span-1"></div>
                        <div class="h-10 bg-white/10 rounded-xl col-span-1"></div>
                        <div class="h-10 bg-white/10 rounded-xl col-span-1"></div>
                        <div class="h-10 bg-white/10 rounded-xl col-span-1"></div>
                        <div class="h-10 bg-white/10 rounded-xl col-span-1"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Card -->
        <div id="resultArea" class="result-container mt-10">
            <div id="vipResultCard"
                class="bg-[#151f32] border border-white/10 rounded-[20px] overflow-hidden flex flex-col md:flex-row group shadow-xl tilt-card">

                <!-- Image -->
                <div
                    class="w-full md:w-2/5 md:min-w-[260px] h-64 md:h-auto bg-white relative flex items-center justify-center p-6 border-b md:border-b-0 md:border-r border-white/10">
                    <span id="discountBadge"
                        class="absolute top-4 right-4 bg-red-600 text-white px-3 py-1 rounded-full font-bold text-sm shadow-lg tracking-wider"></span>
                    <img id="productImage" src="" alt="Produto"
                        class="max-w-full max-h-full object-contain group-hover:scale-105 transition-transform duration-500"
                        onerror="this.style.opacity='0.2'">
                </div>

                <!-- Info -->
                <div class="w-full md:w-3/5 p-6 md:p-8 flex flex-col justify-between">
                    <div class="mb-4">
                        <span id="storeBadge"
                            class="inline-block px-3 py-1 bg-surface border border-white/10 rounded-lg text-xs font-bold uppercase tracking-widest text-slate-300 mb-3">Loja</span>
                        <h2 id="productTitle" class="text-xl md:text-2xl font-semibold text-white leading-snug">
                            Carregando...</h2>
                    </div>

                    <div class="mt-auto space-y-4">
                        <div class="flex items-baseline gap-3 flex-wrap">
                            <span id="productPrice" class="text-3xl md:text-4xl font-extrabold text-accent">---</span>
                            <span id="productOldPrice" class="text-lg text-slate-500 line-through font-medium"
                                style="display:none;"></span>
                        </div>

                        <div id="deliveryInfo"
                            class="inline-flex items-center gap-2 text-sm font-medium text-green-400 bg-green-400/10 border border-green-400/20 px-3 py-1.5 rounded-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                            </svg>
                            <span id="deliveryText"></span>
                        </div>

                        <!-- Action Buttons (5 columns) -->
                        <div class="grid grid-cols-2 sm:grid-cols-5 gap-2 pt-4 border-t border-white/10">
                            <button onclick="copyResult()"
                                class="flex flex-col items-center justify-center gap-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-2 rounded-xl transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" />
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                                </svg>
                                <span class="text-xs">Copiar</span>
                            </button>
                            <button onclick="copyFormattedOffer()"
                                class="flex flex-col items-center justify-center gap-1 bg-accent/20 hover:bg-accent/30 border border-accent/30 text-accent font-semibold py-3 px-2 rounded-xl transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <path
                                        d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
                                    <rect x="9" y="3" width="6" height="4" rx="1" />
                                    <path d="M9 12h6M9 16h4" />
                                </svg>
                                <span class="text-xs">Oferta</span>
                            </button>
                            <button onclick="openLink()"
                                class="flex flex-col items-center justify-center gap-1 bg-green-600 hover:bg-green-500 text-white font-semibold py-3 px-2 rounded-xl transition-colors shadow-lg shadow-green-600/20">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                                    <polyline points="15 3 21 3 21 9" />
                                    <line x1="10" y1="14" x2="21" y2="3" />
                                </svg>
                                <span class="text-xs">Abrir</span>
                            </button>
                            <button onclick="shareWhatsApp()"
                                class="flex flex-col items-center justify-center gap-1 bg-transparent hover:bg-white/5 border border-white/20 text-white font-semibold py-3 px-2 rounded-xl transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <path
                                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                                </svg>
                                <span class="text-xs">WhatsApp</span>
                            </button>
                            <button onclick="showQrCode()"
                                class="flex flex-col items-center justify-center gap-1 bg-transparent hover:bg-white/5 border border-white/20 text-slate-300 font-semibold py-3 px-2 rounded-xl transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7" />
                                    <rect x="14" y="3" width="7" height="7" />
                                    <rect x="3" y="14" width="7" height="7" />
                                    <rect x="14" y="14" width="3" height="3" />
                                    <rect x="18" y="14" width="3" height="3" />
                                    <rect x="14" y="18" width="3" height="3" />
                                    <rect x="18" y="18" width="3" height="3" />
                                </svg>
                                <span class="text-xs">QR Code</span>
                            </button>
                        </div>

                        <!-- Report + Convert Another -->
                        <div class="flex items-center justify-between pt-2">
                            <button onclick="reportLink()"
                                class="flex items-center gap-1.5 text-red-400/70 hover:text-red-400 text-xs transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <circle cx="12" cy="12" r="10" />
                                    <line x1="12" y1="8" x2="12" y2="12" />
                                    <line x1="12" y1="16" x2="12.01" y2="16" />
                                </svg>
                                Informar Erro
                            </button>
                            <button onclick="convertAnother()"
                                class="flex items-center gap-1.5 text-accent/70 hover:text-accent text-xs font-semibold transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    stroke-width="2">
                                    <polyline points="1 4 1 10 7 10" />
                                    <path d="M3.51 15a9 9 0 1 0 .49-3" />
                                </svg>
                                Converter Outro
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent History -->
        <div id="historySection" class="hidden mt-12 w-full mx-auto">
            <div class="flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h3 class="text-white font-semibold text-lg">Convertidos Recentemente</h3>
            </div>
            <div id="historyGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <!-- QR Code Modal -->
    <div id="qrModal" onclick="if(event.target===this)closeQr()">
        <div
            class="bg-surface border border-white/10 rounded-[24px] p-8 flex flex-col items-center gap-5 shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-white font-bold text-xl">QR Code do Link VIP</h3>
            <div id="qrCanvas" class="bg-white p-3 rounded-2xl"></div>
            <p class="text-slate-400 text-sm text-center">Escaneie para abrir a oferta no celular</p>
            <button onclick="copyResult(); closeQr();"
                class="w-full bg-accent hover:bg-accentHover text-primary font-bold py-3 rounded-xl transition-all">Copiar
                Link</button>
            <button onclick="closeQr()"
                class="text-slate-500 hover:text-white text-sm transition-colors">Fechar</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentConvertedUrl = '';
        let currentShareText = '';

        // --- Counter ---
        function updateCounter() {
            const h = loadHistory();
            const badge = document.getElementById('counterBadge');
            const val = document.getElementById('counterValue');
            if (h.length > 0) {
                val.textContent = h.length;
                badge.classList.remove('hidden');
            }
        }

        // --- Tilt Effect ---
        function applyTilt(el) {
            el.addEventListener('mousemove', e => {
                const r = el.getBoundingClientRect();
                const rx = ((e.clientY - r.top - r.height / 2) / (r.height / 2)) * -5;
                const ry = ((e.clientX - r.left - r.width / 2) / (r.width / 2)) * 5;
                el.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.02,1.02,1.02)`;
            });
            el.addEventListener('mouseleave', () => { el.style.transform = ''; });
        }

        // --- History ---
        function loadHistory() {
            try { return JSON.parse(localStorage.getItem('vip_history')) || []; } catch { return []; }
        }
        function saveToHistory(data) {
            let h = loadHistory().filter(x => x.url !== (data.trackedUrl || data.convertedUrl));
            h.unshift({ title: data.title || 'Oferta', price: data.price || '', imageUrl: data.imageUrl || '', url: data.trackedUrl || data.convertedUrl });
            localStorage.setItem('vip_history', JSON.stringify(h.slice(0, 5)));
            renderHistory();
            updateCounter();
        }
        function renderHistory() {
            const h = loadHistory();
            const section = document.getElementById('historySection');
            const grid = document.getElementById('historyGrid');
            if (!h.length) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            grid.innerHTML = h.map(item => `
                <a href="${item.url}" target="_blank" rel="noopener" class="bg-surface/50 hover:bg-surface border border-white/5 hover:border-accent/30 rounded-xl p-3 flex gap-3 items-center transition-all group tilt-card">
                    <div class="w-12 h-12 bg-white rounded-lg flex-shrink-0 flex items-center justify-center p-1 overflow-hidden">
                        <img src="${item.imageUrl}" class="max-w-full max-h-full object-contain mix-blend-multiply group-hover:scale-110 transition-transform" onerror="this.style.display='none'">
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-xs font-semibold truncate">${item.title}</p>
                        <p class="text-accent font-bold text-xs mt-0.5">${item.price}</p>
                    </div>
                </a>`).join('');
            document.querySelectorAll('#historyGrid .tilt-card').forEach(applyTilt);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderHistory();
            updateCounter();
            const card = document.getElementById('vipResultCard');
            if (card) applyTilt(card);
        });

        // --- Main Convert ---
        async function handleConvert() {
            const urlInput = document.getElementById('urlInput').value.trim();
            if (!urlInput) { showError('Cole um link para converter.'); return; }

            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = document.getElementById('spinner');
            const resultArea = document.getElementById('resultArea');
            const skeletonLoader = document.getElementById('skeletonLoader');
            const errorAlert = document.getElementById('errorAlert');

            errorAlert.style.display = 'none';
            resultArea.style.display = 'none';
            skeletonLoader.classList.remove('hidden');
            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const response = await fetch('/api/conversor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch { throw new Error('Resposta inválida do servidor.'); }

                if (!response.ok || !data.success) {
                    throw new Error(data.error || data.validationError || 'Não foi possível converter este link.');
                }

                currentConvertedUrl = data.trackedUrl || data.convertedUrl;

                document.getElementById('productImage').src = data.imageUrl || '';
                document.getElementById('storeBadge').textContent = data.store || 'Loja';
                document.getElementById('productTitle').textContent = data.title || 'Oferta Imperdível';
                document.getElementById('productPrice').textContent = data.price || 'Preço sob consulta';

                const oldPriceEl = document.getElementById('productOldPrice');
                if (data.previousPrice && data.previousPrice !== data.price) {
                    oldPriceEl.textContent = data.previousPrice;
                    oldPriceEl.style.display = 'inline';
                } else { oldPriceEl.style.display = 'none'; }

                const discountBadge = document.getElementById('discountBadge');
                if (data.discountPercent > 0) {
                    discountBadge.textContent = `${data.discountPercent}% OFF`;
                    discountBadge.style.display = 'block';
                } else { discountBadge.style.display = 'none'; }

                const deliveryEl = document.getElementById('deliveryInfo');
                if (data.estimatedDelivery) {
                    document.getElementById('deliveryText').textContent = data.estimatedDelivery;
                    deliveryEl.style.display = 'flex';
                } else { deliveryEl.style.display = 'none'; }

                const couponText = data.hasCoupon && data.couponCode ? `\n🎟️ Cupom: ${data.couponCode}` : '';
                const discountText = data.discountPercent > 0 ? ` 🏷️ -${data.discountPercent}%` : '';
                const deliveryShare = data.estimatedDelivery ? `\n🚚 ${data.estimatedDelivery}` : '';
                currentShareText = `*${data.title || 'Nova Oferta'}*${discountText}\n⚡ Por apenas: *${data.price || ''}*${couponText}${deliveryShare}\n\n🛒 Compre aqui: ${currentConvertedUrl}`;

                skeletonLoader.classList.add('hidden');
                resultArea.style.display = 'block';
                saveToHistory(data);

                // Scroll card into view
                document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            } catch (error) {
                skeletonLoader.classList.add('hidden');
                showError(error.message);
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function convertAnother() {
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('urlInput').value = '';
            document.getElementById('urlInput').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showError(msg) {
            const el = document.getElementById('errorAlert');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function copyResult() {
            if (!currentConvertedUrl) return;
            navigator.clipboard.writeText(currentConvertedUrl)
                .then(() => showToast('🔗 Link copiado!'))
                .catch(() => showToast('Erro ao copiar.'));
        }

        function copyFormattedOffer() {
            if (!currentShareText) return;
            navigator.clipboard.writeText(currentShareText)
                .then(() => showToast('📋 Oferta copiada com formatação!'))
                .catch(() => showToast('Erro ao copiar.'));
        }

        function openLink() {
            if (currentConvertedUrl) window.open(currentConvertedUrl, '_blank', 'noopener,noreferrer');
        }

        function shareWhatsApp() {
            if (!currentShareText) return;
            window.open(`https://wa.me/?text=${encodeURIComponent(currentShareText)}`, '_blank');
        }

        function reportLink() {
            const originalUrl = document.getElementById('urlInput').value.trim();
            const msg = `Olá! Meu link deu problema.\n\n🔗 Original: ${originalUrl}\n🔗 Convertido: ${currentConvertedUrl}`;
            window.open(`https://wa.me/5513996877283?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- QR Code ---
        let qrInstance = null;
        function showQrCode() {
            if (!currentConvertedUrl) return;
            const modal = document.getElementById('qrModal');
            const canvas = document.getElementById('qrCanvas');
            canvas.innerHTML = '';
            qrInstance = new QRCode(canvas, {
                text: currentConvertedUrl,
                width: 220, height: 220,
                colorDark: '#0f172a', colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            modal.classList.add('show');
        }
        function closeQr() {
            document.getElementById('qrModal').classList.remove('show');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>

</html>
